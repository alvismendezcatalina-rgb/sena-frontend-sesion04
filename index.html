<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta de Perfil - Sesión 04</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main class="profile-container">
        <article class="profile-card">
            <header class="profile-header">
                <img src="img/img1.avif" alt="Fotografía de perfil de desarrolladora de software en primer plano" class="profile-avatar">
                <h1 class="profile-name">Catalina Méndez</h1>
                <p class="profile-role">Desarrolladora Full Stack</p>
            </header>

            <section class="profile-stats">
                <div class="stat-item">
                    <span class="stat-number">47</span>
                    <span class="stat-label">Proyectos</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">2.4k</span>
                    <span class="stat-label">Commits</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">12</span>
                    <span class="stat-label">Certificados</span>
                </div>
            </section>

            <footer class="profile-actions">
                <button class="btn-action">Seguir Perfil</button>
            </footer>
        </article>
    </main>

</body>
</html>
